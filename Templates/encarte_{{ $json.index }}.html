<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial Black', sans-serif; }
    
    body { 
      width: 1080px; 
      height: 1350px; 
      position: relative; 
      overflow: hidden; 
      background-color: #000;
    }

    .bg-img { 
      position: absolute; 
      top: 0; 
      left: 0; 
      width: 1080px; 
      height: 1350px; 
      object-fit: cover; 
      z-index: 1; 
    }

    #card { 
      position: relative; 
      z-index: 2; 
      width: 1080px; 
      height: 1350px; 
    }

    .box-precos { 
      position: absolute;
      top: 700px; 
      right: -10px; 
      width: 550px; 
      background: transparent; 
      color: #fff; 
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px;
    }

    .produto-title { 
      font-size: 38px; 
      font-weight: 900; 
      text-transform: uppercase; 
      color: #ffffff;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      max-width: 500px;
      max-height: 90px;
      line-height: 1.1;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .preco-de { 
      font-size: 30px; 
      text-decoration: line-through; 
      color: #ff5555; 
      font-weight: bold;
    }

    .preco-por { 
      font-size: 50px; 
      font-weight: 900; 
      color: #fff; 
      line-height: 0.95; 
      margin: 5px 0 15px 0; 
      text-shadow: 0px 4px 10px rgba(0,0,0,0.5);
    }

    .validade { 
      display: inline-block; 
      background: #f1c40f; 
      color: #000; 
      padding: 6px 20px; 
      border-radius: 50px; 
      font-size: 22px;
      font-weight: 800; 
    }
  </style>
</head>
<body>
  <img class="bg-img" src="file:///C:/Users/zblak/.n8n-files/Templates/produtos/hortifruti/alho.png" onerror="this.src='file:///C:/Users/zblak/.n8n-files/Templates/produtos/mercearia/default.png'">
  <div id="card">
    <div class="box-precos">
      <div class="produto-title">ALHO</div>
      <div class="preco-de">De: R$ 5,99</div>
      <div class="preco-por">Por: R$ 4,99</div>
      <div class="validade">Válido até sábado</div>
    </div>
  </div>
</body>
</html>
